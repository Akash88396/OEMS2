{% extends 'base.html' %}

{% block title %}Login | Exam System{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md bg-white rounded-xl shadow-2xl overflow-hidden">
        
        <div class="bg-primary py-6 text-center">
            <h2 class="text-3xl font-bold text-white">Welcome Back</h2>
            <p class="text-blue-200 mt-1">Secure Examination Portal</p>
        </div>

        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Username</label>
                <input type="text" name="username" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Enter your ID" required>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2">Password</label>
                <input type="password" name="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" placeholder="••••••••" required>
            </div>

            <button type="submit" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition duration-300 transform hover:scale-105">
                Login to Dashboard
            </button>
            
            <div class="text-center text-sm text-gray-500 mt-4">
                Don't have an account? <a href="#" class="text-primary hover:underline">Contact Admin</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
